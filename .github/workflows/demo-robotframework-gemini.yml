# =============================================================================
# Demo didático — ROBOTFRAMEWORK_GEMINI via GitHub Action
# =============================================================================
#
# O que este workflow ensina:
#   1. Usar a Action do Marketplace:
#      https://github.com/marketplace/actions/robot-framework-docker
#      (imagem ghcr.io/carlosnizolli/docker-robotframework)
#   2. Passar GEMINI_API_KEY como secret (nunca commitar a chave)
#   3. Publicar report.html / log.html como artifact do GitHub Actions
#
# Quem pode executar:
#   Só @carlosnizolli (job com if: github.actor == 'carlosnizolli').
#   Outros usuários: o workflow aparece, mas o job fica Skipped e a secret
#   não é consumida. Quem tiver só Read no repo nem consegue clicar em Run.
#
# Pré-requisito (uma vez no GitHub):
#   Settings → Secrets and variables → Actions → New repository secret
#   Nome:  GEMINI_API_KEY
#   Valor: chave do Google AI Studio
#
# Como rodar:
#   Actions → "Demo ROBOTFRAMEWORK_GEMINI" → Run workflow
#
# Por que só workflow_dispatch?
#   Os testes CT02–CT04 chamam a API Gemini; sem a secret o job falha de propósito
#   com mensagem clara. Não roda em todo push para não gastar cota sem chave.
# =============================================================================

name: Demo ROBOTFRAMEWORK_GEMINI

on:
  workflow_dispatch:
    inputs:
      robot_options:
        description: "Opções extras do Robot (ex.: -t CT01* para smoke sem Gemini)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  REPORTS_HOST_DIR: Results/docker-robotframework-gemini

jobs:
  demo-robotframework-gemini:
    name: Suite ROBOTFRAMEWORK_GEMINI (Docker Action)
    # Só o mantenedor executa; demais actors → Skipped (sem gastar secret/cota)
    if: github.actor == 'carlosnizolli'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout — exemplos (este repositório)
        uses: actions/checkout@v4

      - name: Conferir secret GEMINI_API_KEY
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ROBOT_OPTIONS_INPUT: ${{ inputs.robot_options }}
        run: |
          set -euo pipefail
          # CT01 é smoke de browser e não chama Gemini — permite rodar sem secret.
          if echo " ${ROBOT_OPTIONS_INPUT} " | grep -Eq '[[:space:]]-t[[:space:]]+CT01'; then
            echo "Input aponta para CT01* — secret Gemini opcional neste run."
            exit 0
          fi
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "::error::Secret GEMINI_API_KEY não configurada."
            echo ""
            echo "Como criar:"
            echo "  1. Obtenha a chave em https://aistudio.google.com/apikey"
            echo "  2. No GitHub: Settings → Secrets and variables → Actions"
            echo "  3. New repository secret → nome GEMINI_API_KEY"
            echo "  4. Rode de novo: Actions → Demo ROBOTFRAMEWORK_GEMINI → Run workflow"
            echo ""
            echo "Sem chave, dá para testar só o browser com o input:"
            echo "  robot_options = -t CT01*"
            exit 1
          fi
          echo "GEMINI_API_KEY encontrada (valor não é exibido)."

      - name: Run Robot Framework (Marketplace Action)
        uses: carlosnizolli/robotframework-docker-actions@v1
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Alias oficial: aponta para o Flash mais recente
          GEMINI_MODEL: gemini-flash-latest
        with:
          tests_path: ROBOTFRAMEWORK_GEMINI/Suites/DemoRobotframeworkGemini.robot
          reports_path: ${{ env.REPORTS_HOST_DIR }}
          options: ${{ inputs.robot_options }}
          threads: "1"

      - name: Upload dos artefatos Robot (sempre, para depurar falhas)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-robotframework-gemini
          path: |
            ${{ env.REPORTS_HOST_DIR }}/log.html
            ${{ env.REPORTS_HOST_DIR }}/report.html
            ${{ env.REPORTS_HOST_DIR }}/output.xml
            ${{ env.REPORTS_HOST_DIR }}/**/*.png
          if-no-files-found: warn
          retention-days: 14
