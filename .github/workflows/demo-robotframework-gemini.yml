# =============================================================================
# Demo didático — ROBOTFRAMEWORK_GEMINI no Docker
# =============================================================================
#
# O que este workflow ensina:
#   1. Usar a imagem https://github.com/carlosnizolli/docker-robotframework
#      (já inclui Robot Framework, Browser Library, Xvfb e robotframework-gemini)
#   2. Montar este repositório no container
#   3. Passar GEMINI_API_KEY como secret (nunca commitar a chave)
#   4. Publicar report.html / log.html como artifact do GitHub Actions
#
# Pré-requisito (uma vez no GitHub):
#   Settings → Secrets and variables → Actions → New repository secret
#   Nome:  GEMINI_API_KEY
#   Valor: chave do Google AI Studio
#
# Como rodar:
#   Actions → "Demo ROBOTFRAMEWORK_GEMINI" → Run workflow
#
# Por que só workflow_dispatch?
#   Os testes CT02–CT04 chamam a API Gemini; sem a secret o job falha de propósito
#   com mensagem clara. Não roda em todo push para não gastar cota sem chave.
# =============================================================================

name: Demo ROBOTFRAMEWORK_GEMINI

on:
  workflow_dispatch:
    inputs:
      robot_options:
        description: "Opções extras do Robot (ex.: -t CT01* para smoke sem Gemini)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  # Tag local da imagem construída a partir do repositório docker-robotframework
  DOCKER_IMAGE: robotframework-qa:ci
  REPORTS_HOST_DIR: Results/docker-robotframework-gemini

jobs:
  demo-robotframework-gemini:
    name: Suite ROBOTFRAMEWORK_GEMINI (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout — exemplos (este repositório)
        uses: actions/checkout@v4

      # A imagem ainda não é publicada em um registry público neste exemplo.
      # Em produção você pode trocar este passo por: docker pull <sua-imagem>
      - name: Checkout — docker-robotframework (fonte da imagem)
        uses: actions/checkout@v4
        with:
          repository: carlosnizolli/docker-robotframework
          path: .docker-robotframework

      - name: Build da imagem Docker (Robot + Browser + robotframework-gemini)
        run: |
          set -euo pipefail
          echo "Building ${DOCKER_IMAGE} from carlosnizolli/docker-robotframework ..."
          DOCKER_BUILDKIT=1 docker build \
            -t "${DOCKER_IMAGE}" \
            .docker-robotframework

      - name: Conferir secret GEMINI_API_KEY
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ROBOT_OPTIONS_INPUT: ${{ inputs.robot_options }}
        run: |
          set -euo pipefail
          # CT01 é smoke de browser e não chama Gemini — permite rodar sem secret.
          if echo " ${ROBOT_OPTIONS_INPUT} " | grep -Eq '[[:space:]]-t[[:space:]]+CT01'; then
            echo "Input aponta para CT01* — secret Gemini opcional neste run."
            exit 0
          fi
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "::error::Secret GEMINI_API_KEY não configurada."
            echo ""
            echo "Como criar:"
            echo "  1. Obtenha a chave em https://aistudio.google.com/apikey"
            echo "  2. No GitHub: Settings → Secrets and variables → Actions"
            echo "  3. New repository secret → nome GEMINI_API_KEY"
            echo "  4. Rode de novo: Actions → Demo ROBOTFRAMEWORK_GEMINI → Run workflow"
            echo ""
            echo "Sem chave, dá para testar só o browser com o input:"
            echo "  robot_options = -t CT01*"
            exit 1
          fi
          echo "GEMINI_API_KEY encontrada (valor não é exibido)."

      - name: Preparar pasta de relatórios (UID 1000 da imagem precisa escrever)
        run: |
          mkdir -p "${REPORTS_HOST_DIR}"
          # Runner do GitHub Actions costuma NÃO ser UID 1000; a imagem sim.
          chmod 777 "${REPORTS_HOST_DIR}"

      - name: Executar suite no container
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ROBOT_OPTIONS_INPUT: ${{ inputs.robot_options }}
        run: |
          set -euo pipefail

          # Caminhos DENTRO do container (repo montado em /workspace)
          TESTS=/workspace/ROBOTFRAMEWORK_GEMINI/Suites/DemoRobotframeworkGemini.robot
          REPORTS=/opt/robotframework/reports

          echo "Suite:  ${TESTS}"
          echo "Image:  ${DOCKER_IMAGE}"
          echo "Opts:   ${ROBOT_OPTIONS_INPUT:-<(vazio)>}"

          docker run --rm \
            --name demo-robotframework-gemini \
            -e GEMINI_API_KEY \
            -e ROBOT_TESTS_DIR="${TESTS}" \
            -e ROBOT_REPORTS_DIR="${REPORTS}" \
            -e ROBOT_OPTIONS="${ROBOT_OPTIONS_INPUT}" \
            -e ROBOT_THREADS=1 \
            -v "${{ github.workspace }}:/workspace:ro" \
            -v "${{ github.workspace }}/${REPORTS_HOST_DIR}:${REPORTS}" \
            "${DOCKER_IMAGE}"

      - name: Upload dos artefatos Robot (sempre, para depurar falhas)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-robotframework-gemini
          path: |
            ${{ env.REPORTS_HOST_DIR }}/log.html
            ${{ env.REPORTS_HOST_DIR }}/report.html
            ${{ env.REPORTS_HOST_DIR }}/output.xml
            ${{ env.REPORTS_HOST_DIR }}/**/*.png
          if-no-files-found: warn
          retention-days: 14
